# Google App Engine standard (Python 3.12).
# Deploy from this directory so requirements.txt and the app package resolve:
#   cd app && gcloud app deploy app.yaml
#
# The app ASGI stack is served via Gunicorn + UvicornWorker (see gunicorn.conf.py).

runtime: python312

instance_class: F2

env_variables:
  PYTHONPATH: "."

entrypoint: gunicorn -c gunicorn.conf.py server:app
