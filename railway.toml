[build]
builder = "RAILPACK"
watchPatterns = [
  "/app/**",
  "/requirements.txt",
  "/Procfile",
  "/gunicorn.conf.py",
  "/server.py",
  "/.python-version",
  "/railway.toml",
]

[deploy]
startCommand = "gunicorn server:app"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
